<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TX媒体库AV求片 - 提交番号进行自动下载">
    <title>TX媒体库AV求片</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% if turnstile_site_key %}
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    {% endif %}
</head>

<body>
    <div class="container">
        <!-- 标题 -->
        <header class="header">
            <h1>TX媒体库AV求片</h1>
            <p class="subtitle">下载管理器</p>
        </header>

        <!-- 提交表单 -->
        <section class="card submit-card">
            <h2>📥 提交下载</h2>
            <form id="submitForm" class="submit-form">
                <div class="input-group">
                    <input type="text" id="avidInput" name="avid" placeholder="输入番号 (如 SONE-217 或 FC2-PPV-123456)"
                        autocomplete="off" maxlength="30" required>
                    <button type="submit" id="submitBtn">提交</button>
                </div>
                {% if turnstile_site_key %}
                <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}" data-callback="onTurnstileSuccess"
                    data-theme="dark"></div>
                {% endif %}
                <div id="message" class="message" style="display:none;"></div>
            </form>
        </section>

        <!-- 正在下载 -->
        <section class="card">
            <h2>⏬ 正在下载</h2>
            <div id="currentList" class="task-list">
                <div class="empty-state">暂无正在下载的任务</div>
            </div>
        </section>

        <!-- 等待队列 -->
        <section class="card">
            <h2>⏳ 等待队列</h2>
            <div id="waitingList" class="task-list">
                <div class="empty-state">队列为空</div>
            </div>
        </section>

        <!-- 历史记录 -->
        <section class="card">
            <h2>📋 历史记录</h2>
            <div class="history-filters" id="historyFilters">
                <!-- 状态筛选 - 自定义下拉框 -->
                <div class="custom-select" id="filterStatusSelect" data-value="">
                    <div class="custom-select-trigger" tabindex="0">
                        <span class="custom-select-label">全部状态</span>
                        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M6 9l6 6 6-6" />
                            </svg></span>
                    </div>
                    <div class="custom-select-options">
                        <div class="custom-select-option selected" data-value="">全部状态</div>
                        <div class="custom-select-option" data-value="completed">✅ 已完成</div>
                        <div class="custom-select-option" data-value="failed">❌ 失败</div>
                    </div>
                </div>
                <!-- 来源筛选 - 自定义下拉框 -->
                <div class="custom-select" id="filterSourceSelect" data-value="">
                    <div class="custom-select-trigger" tabindex="0">
                        <span class="custom-select-label">全部方式</span>
                        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <path d="M6 9l6 6 6-6" />
                            </svg></span>
                    </div>
                    <div class="custom-select-options">
                        <div class="custom-select-option selected" data-value="">全部方式</div>
                    </div>
                </div>
            </div>
            <div id="historyList" class="task-list">
                <div class="empty-state">暂无历史记录</div>
            </div>
            <div class="pagination" id="historyPagination" style="display:none;">
                <button id="prevPage" class="page-btn" title="上一页">‹</button>
                <span id="pageInfo" class="page-info"></span>
                <button id="nextPage" class="page-btn" title="下一页">›</button>
                <div class="per-page-group">
                    <span>每页</span>
                    <div class="custom-select" id="perPageSelect" data-value="5">
                        <div class="custom-select-trigger" tabindex="0">
                            <span class="custom-select-label">5</span>
                            <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5">
                                    <path d="M6 9l6 6 6-6" />
                                </svg></span>
                        </div>
                        <div class="custom-select-options">
                            <div class="custom-select-option selected" data-value="5">5</div>
                            <div class="custom-select-option" data-value="10">10</div>
                            <div class="custom-select-option" data-value="20">20</div>
                            <div class="custom-select-option" data-value="50">50</div>
                            <div class="custom-select-option" data-value="100">100</div>
                        </div>
                    </div>
                    <span>条</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        let turnstileToken = '';

        // ==================== 历史分页状态 ====================
        let historyPage = 1;
        let historyTotalPages = 1;
        let historyPerPage = 5;
        let historyFilterStatus = '';
        let historyFilterSource = '';
        let knownSources = [];   // 缓存已知的source列表

        // ==================== 自定义下拉框组件 ====================
        class CustomSelect {
            constructor(el, onChange) {
                this.el = el;
                this.trigger = el.querySelector('.custom-select-trigger');
                this.label = el.querySelector('.custom-select-label');
                this.optionsContainer = el.querySelector('.custom-select-options');
                this.onChange = onChange;
                this._value = el.dataset.value || '';

                this.trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggle();
                });

                this.trigger.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        this.toggle();
                    }
                });

                this.optionsContainer.addEventListener('click', (e) => {
                    const option = e.target.closest('.custom-select-option');
                    if (option) {
                        this.select(option.dataset.value, option.textContent);
                    }
                });
            }

            toggle() {
                // 关闭其他所有打开的下拉框
                document.querySelectorAll('.custom-select.open').forEach(s => {
                    if (s !== this.el) s.classList.remove('open');
                });
                this.el.classList.toggle('open');
            }

            close() {
                this.el.classList.remove('open');
            }

            select(value, text) {
                this._value = value;
                this.el.dataset.value = value;
                this.label.textContent = text;

                // 更新选中状态
                this.optionsContainer.querySelectorAll('.custom-select-option').forEach(opt => {
                    opt.classList.toggle('selected', opt.dataset.value === value);
                });

                this.close();
                if (this.onChange) this.onChange(value);
            }

            get value() {
                return this._value;
            }

            // 动态设置选项列表
            setOptions(options) {
                // options: [{value, label}]
                const currentValue = this._value;
                this.optionsContainer.innerHTML = '';
                options.forEach(opt => {
                    const div = document.createElement('div');
                    div.className = 'custom-select-option';
                    div.dataset.value = opt.value;
                    div.textContent = opt.label;
                    if (opt.value === currentValue) {
                        div.classList.add('selected');
                    }
                    this.optionsContainer.appendChild(div);
                });

                // 如果当前值不在新选项中，重置
                const validValues = options.map(o => o.value);
                if (!validValues.includes(currentValue)) {
                    const first = options[0];
                    if (first) this.select(first.value, first.label);
                }
            }
        }

        // 点击外部关闭所有下拉框
        document.addEventListener('click', () => {
            document.querySelectorAll('.custom-select.open').forEach(s => s.classList.remove('open'));
        });

        // 阻止下拉框内部点击冒泡
        document.querySelectorAll('.custom-select').forEach(s => {
            s.addEventListener('click', e => e.stopPropagation());
        });

        // 初始化自定义下拉框
        const filterStatusSelect = new CustomSelect(
            document.getElementById('filterStatusSelect'),
            (value) => {
                historyFilterStatus = value;
                historyPage = 1;
                refreshHistory();
            }
        );

        const filterSourceSelect = new CustomSelect(
            document.getElementById('filterSourceSelect'),
            (value) => {
                historyFilterSource = value;
                historyPage = 1;
                refreshHistory();
            }
        );

        const perPageSelect = new CustomSelect(
            document.getElementById('perPageSelect'),
            (value) => {
                historyPerPage = parseInt(value, 10);
                historyPage = 1;
                refreshHistory();
            }
        );

        // Turnstile回调
        function onTurnstileSuccess(token) {
            turnstileToken = token;
        }

        // 显示消息
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message message-' + type;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        }

        // 提交表单
        document.getElementById('submitForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('avidInput');
            const btn = document.getElementById('submitBtn');
            const avid = input.value.trim();

            if (!avid) {
                showMessage('请输入番号', 'error');
                return;
            }

            {% if turnstile_site_key %}
            if (!turnstileToken) {
                showMessage('请先完成人机验证', 'error');
                return;
            }
            {% endif %}

            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                const resp = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        avid: avid,
                        turnstile_token: turnstileToken
                    })
                });
                const data = await resp.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    input.value = '';
                    turnstileToken = '';
                    // 重置Turnstile
                    if (typeof turnstile !== 'undefined') {
                        turnstile.reset();
                    }
                    refreshQueue();
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '提交';
            }
        });

        // 状态映射
        const STATUS_MAP = {
            'waiting': { label: '等待中', class: 'status-waiting' },
            'searching': { label: '搜索中', class: 'status-active' },
            'downloading': { label: '下载中', class: 'status-active' },
            'scraping': { label: '刮削中', class: 'status-active' },
            'prowlarr_search': { label: 'Prowlarr搜索中', class: 'status-active' },
            'completed': { label: '已完成', class: 'status-completed' },
            'failed': { label: '失败', class: 'status-failed' },
        };

        // 格式化时间
        function formatTime(ts) {
            if (!ts) return '';
            try {
                const d = new Date(ts);
                return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            } catch { return ts; }
        }

        // 渲染任务项
        function renderItem(item, showSource) {
            const st = STATUS_MAP[item.status] || { label: item.status, class: '' };
            let html = `
                <div class="task-item">
                    <div class="task-main">
                        <span class="task-avid">${escapeHtml(item.avid)}</span>
                        <div class="task-main-actions">
                            <span class="task-status ${st.class}">${st.label}</span>`;

            // 失败项目显示重试按钮（仅历史记录中）
            if (showSource && item.status === 'failed' && item.id) {
                html += `<button class="retry-btn" onclick="retryItem(${item.id}, this)" title="重试"><svg class="retry-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>重试</button>`;
            }

            html += `</div></div>`;

            if (item.title) {
                html += `<div class="task-title">${escapeHtml(item.title)}</div>`;
            }
            if (item.progress) {
                html += `<div class="task-progress">${escapeHtml(item.progress)}</div>`;
            }
            if (showSource && item.source) {
                html += `<div class="task-source">数据源: ${escapeHtml(item.source)}</div>`;
            }
            if (item.error_msg) {
                html += `<div class="task-error">错误: ${escapeHtml(item.error_msg)}</div>`;
            }
            html += `<div class="task-time">${formatTime(item.created_at)}</div>`;
            html += `</div>`;
            return html;
        }

        // 防XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 渲染列表
        function renderList(containerId, items, emptyText, showSource) {
            const container = document.getElementById(containerId);
            if (!items || items.length === 0) {
                container.innerHTML = `<div class="empty-state">${emptyText}</div>`;
                return;
            }
            container.innerHTML = items.map(item => renderItem(item, showSource)).join('');
        }

        // ==================== 队列刷新（正在下载 + 等待） ====================
        async function refreshQueue() {
            try {
                const resp = await fetch('/api/queue');
                const data = await resp.json();
                renderList('currentList', data.current, '暂无正在下载的任务', false);
                renderList('waitingList', data.waiting, '队列为空', false);
            } catch (err) {
                console.error('刷新队列失败:', err);
            }
        }

        // ==================== 历史记录分页 ====================
        async function refreshHistory() {
            try {
                const params = new URLSearchParams({
                    page: historyPage,
                    per_page: historyPerPage,
                });
                if (historyFilterStatus) params.set('status', historyFilterStatus);
                if (historyFilterSource) params.set('source', historyFilterSource);

                const resp = await fetch('/api/history?' + params.toString());
                const data = await resp.json();

                // 渲染历史列表
                renderList('historyList', data.items, '暂无历史记录', true);

                // 更新分页状态
                historyPage = data.page;
                historyTotalPages = data.total_pages;
                updatePagination(data.total);

                // 更新下载方式下拉选项
                if (data.sources && data.sources.length > 0) {
                    updateSourceFilter(data.sources);
                }
            } catch (err) {
                console.error('刷新历史失败:', err);
            }
        }

        // 更新分页控件
        function updatePagination(total) {
            const pagination = document.getElementById('historyPagination');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');

            if (total === 0) {
                pagination.style.display = 'none';
                return;
            }

            pagination.style.display = 'flex';
            pageInfo.textContent = `第 ${historyPage} / ${historyTotalPages} 页（共 ${total} 条）`;
            prevBtn.disabled = historyPage <= 1;
            nextBtn.disabled = historyPage >= historyTotalPages;
        }

        // 更新下载方式筛选下拉（自定义下拉框）
        function updateSourceFilter(sources) {
            // 仅当sources列表变化时才重新渲染
            const newKey = sources.join(',');
            const oldKey = knownSources.join(',');
            if (newKey === oldKey) return;

            knownSources = sources;
            const options = [{ value: '', label: '全部方式' }];
            sources.forEach(s => {
                options.push({ value: s, label: s });
            });
            filterSourceSelect.setOptions(options);
        }

        // ==================== 重试失败项目 ====================
        async function retryItem(itemId, btnEl) {
            {% if turnstile_site_key %}
            if (!turnstileToken) {
                showMessage('请先完成人机验证后再重试', 'error');
                return;
            }
            {% endif %}

            btnEl.disabled = true;
            btnEl.textContent = '重试中...';

            try {
                const resp = await fetch(`/api/retry/${itemId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        turnstile_token: turnstileToken
                    })
                });
                const data = await resp.json();

                if (data.success) {
                    showMessage(data.message, 'success');
                    turnstileToken = '';
                    if (typeof turnstile !== 'undefined') {
                        turnstile.reset();
                    }
                    refreshHistory();
                    refreshQueue();
                } else {
                    showMessage(data.message, 'error');
                    btnEl.disabled = false;
                    btnEl.innerHTML = '<svg class="retry-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>重试';
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
                btnEl.disabled = false;
                btnEl.innerHTML = '<svg class="retry-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>重试';
            }
        }

        // ==================== 事件绑定 ====================

        // 翻页按钮
        document.getElementById('prevPage').addEventListener('click', () => {
            if (historyPage > 1) {
                historyPage--;
                refreshHistory();
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            if (historyPage < historyTotalPages) {
                historyPage++;
                refreshHistory();
            }
        });

        // ==================== 初始化 + 自动刷新 ====================
        refreshQueue();
        refreshHistory();
        setInterval(refreshQueue, 3000);
    </script>
</body>

</html>
